pre-commit:
  commands:
    check-deps:
      run: |
        pnpm check-deps
      stage_fixed: true

    check-types:
      run: |
        pnpm check-types

    lint:
      run: |
        pnpm lint-biome {staged_files}
      stage_fixed: true

    format-packages:
      run: |
        pnpm lint-syncpack
      stage_fixed: true

    format-markdown:
      glob: "**/*.md"
      run: |
        pnpm exec dprint fmt --config dprint.json --allow-no-files {staged_files}
      stage_fixed: true

    i18n-check:
      # Fires when any Lingui-touched file under a web app is staged. Runs
      # `i18n:check` in every workspace that defines it via pnpm's
      # `--if-present` filter — internal is the only web app here today, any
      # new web app tomorrow without editing this file.
      #
      # No `stage_fixed`: `i18n:check` is read-only (it verifies catalogs
      # are in sync, never writes). Auto-amending .po would silently stage
      # untranslated msgstr entries, which then ship as empty strings.
      glob: "apps/internal/**/*.{tsx,ts,po}"
      run: |
        pnpm -r --parallel --if-present run i18n:check

pre-push:
  commands:
    secrets:
      # Scan for leaked secrets before publishing to the PUBLIC repo.
      # GitHub push protection catches known token formats server-side;
      # this adds local pre-push coverage, incl. bespoke patterns defined
      # in .secretlintrc.json. .gitignore is respected by default;
      # .secretlintignore excludes vendored docs/repos and the lockfile.
      run: |
        pnpm lint-secrets

    test:
      # Unit suite AND the live-DB integration suite. `turbo test` alone runs
      # only the default config, which EXCLUDES `*.integration.test.ts`, so
      # schema bugs used to slip straight to CI; `test:integration` closes that.
      # It runs against a disposable `batuda_it` DB that
      # scripts/integration-db-setup.ts creates, migrates to HEAD, and seeds, so
      # local matches CI's fresh schema instead of a stale shared dev DB.
      # `--concurrency=1` serialises @batuda/server and @batuda/mail-worker,
      # which share that one DB and TRUNCATE shared tables in beforeAll.
      run: |
        pnpm turbo test test:integration --concurrency=1

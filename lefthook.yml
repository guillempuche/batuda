pre-commit:
  commands:
    check-deps:
      run: |
        pnpm check-deps
      stage_fixed: true

    check-types:
      run: |
        pnpm check-types

    lint:
      run: |
        pnpm lint-biome {staged_files}
      stage_fixed: true

    format-packages:
      run: |
        pnpm lint-syncpack
      stage_fixed: true

    format-markdown:
      glob: "**/*.md"
      run: |
        pnpm exec dprint fmt --config dprint.json --allow-no-files {staged_files}
      stage_fixed: true

    i18n-check:
      # Fires when any Lingui-touched file under a web app is staged. Runs
      # `i18n:check` in every workspace that defines it via pnpm's
      # `--if-present` filter — internal is the only web app here today, any
      # new web app tomorrow without editing this file.
      glob: "apps/internal/**/*.{tsx,ts,po}"
      run: |
        pnpm -r --parallel --if-present run i18n:check
      stage_fixed: true

pre-push:
  commands:
    test:
      # `--concurrency=1` because @batuda/server and @batuda/mail-worker
      # both run live-DB integration tests against localhost:5433. Server's
      # `multi-org-isolation.test.ts` TRUNCATEs `email_messages`/
      # `email_thread_links` in beforeAll; mail-worker's
      # `threading.test.ts` inserts into the same tables and races the
      # truncate when both packages run in parallel. Serialise until we
      # ship per-package DB isolation.
      run: |
        pnpm turbo test --concurrency=1

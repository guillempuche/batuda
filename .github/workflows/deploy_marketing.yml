name: Deploy Marketing

on:
  push:
    tags:
      - "marketing-v*"
  workflow_dispatch:

concurrency:
  group: deploy-marketing
  cancel-in-progress: false

env:
  KRAFTCLOUD_METRO: fra

jobs:
  deploy:
    name: Deploy to KraftCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare files for KraftCloud
        run: |
          cp apps/marketing/Kraftfile Kraftfile
          cp apps/marketing/Dockerfile Dockerfile

      - name: Get KraftCloud CLI version
        id: kraft-version
        run: |
          KRAFT_VERSION=$(curl -sS https://api.github.com/repos/unikraft/kraftkit/releases/latest | jq -r '.tag_name')
          echo "version=${KRAFT_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache KraftCloud CLI
        id: kraft-cache
        uses: actions/cache@v4
        with:
          path: kraft.deb
          key: kraft-cli-${{ steps.kraft-version.outputs.version }}

      - name: Download KraftCloud CLI
        if: steps.kraft-cache.outputs.cache-hit != 'true'
        run: |
          KRAFT_VERSION=${{ steps.kraft-version.outputs.version }}
          curl -sSfL "https://github.com/unikraft/kraftkit/releases/download/${KRAFT_VERSION}/kraftkit_${KRAFT_VERSION#v}_linux_amd64.deb" -o kraft.deb

      - name: Install KraftCloud CLI
        run: |
          sudo dpkg -i kraft.deb
          which kraft

      - name: Extract version from tag
        id: meta
        run: |
          if [[ "$GITHUB_REF_NAME" == marketing-v* ]]; then
            echo "version=${GITHUB_REF_NAME#marketing-v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./apps/marketing/package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Check if KraftCloud service exists
        id: service-check
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          if kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service get engranatge-marketing >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Service engranatge-marketing already exists — will perform rolling update"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Service engranatge-marketing does not exist — will create it"
          fi

      - name: Deploy to KraftCloud
        uses: nick-fields/retry@v3
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 10
          # Rollout strategy (zero-downtime for the public site):
          #
          #   --rollout remove_sequential
          #     KraftCloud spins up the new instance first, waits for it to
          #     boot and bind :3000, then removes the old one. The old
          #     instance keeps serving traffic until the new one is ready,
          #     so visitors never hit a 502/504.
          #
          #   --rollout-wait 30s
          #     Grace period between "new instance created" and "old
          #     instance removed". Nitro + Node on a cold unikernel needs
          #     ~5-15s to boot and accept connections; 30s is the safety
          #     margin.
          #
          #   -M 1024
          #     Memory budget. 512 MiB caused CPIO extraction to fail with
          #     "No space left on device" — the 269 MiB image rootfs plus
          #     the Node runtime needs ~800 MiB working set.
          #
          #   --name is OMITTED on the --service branch so kraft can
          #   auto-generate a unique instance name; this is what lets the
          #   old and new instances coexist during the rollout window.
          command: |
            if [ "${{ steps.service-check.outputs.exists }}" = "true" ]; then
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --service engranatge-marketing \
                --rollout remove_sequential \
                --rollout-wait 30s \
                -M 1024 \
                .
            else
              # First-time deploy: kraft creates the service + requests a
              # Let's Encrypt cert via -d <domain>. Port 443:3000 maps TLS
              # termination to Nitro's listen port.
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --name engranatge-marketing \
                -d engranatge.com \
                -p 443:3000 \
                -M 1024 \
                .
            fi

      - name: Verify deployment
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          sleep 5
          kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service get engranatge-marketing || true
          curl -sSf https://engranatge.com -o /dev/null && echo "Site is accessible" || echo "::warning::Site not accessible"

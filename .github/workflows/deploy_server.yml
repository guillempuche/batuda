name: Deploy Server

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

env:
  KRAFTCLOUD_METRO: fra

jobs:
  deploy:
    name: Deploy to KraftCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare files for KraftCloud
        run: |
          cp apps/server/Kraftfile Kraftfile
          cp apps/server/Dockerfile Dockerfile

      - name: Get KraftCloud CLI version
        id: kraft-version
        run: |
          KRAFT_VERSION=$(curl -sS https://api.github.com/repos/unikraft/kraftkit/releases/latest | jq -r '.tag_name')
          echo "version=${KRAFT_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache KraftCloud CLI
        id: kraft-cache
        uses: actions/cache@v4
        with:
          path: kraft.deb
          key: kraft-cli-${{ steps.kraft-version.outputs.version }}

      - name: Download KraftCloud CLI
        if: steps.kraft-cache.outputs.cache-hit != 'true'
        run: |
          KRAFT_VERSION=${{ steps.kraft-version.outputs.version }}
          curl -sSfL "https://github.com/unikraft/kraftkit/releases/download/${KRAFT_VERSION}/kraftkit_${KRAFT_VERSION#v}_linux_amd64.deb" -o kraft.deb

      - name: Install KraftCloud CLI
        run: |
          sudo dpkg -i kraft.deb
          which kraft

      - name: Extract version from tag
        id: meta
        run: |
          if [[ "$GITHUB_REF_NAME" == server-v* ]]; then
            echo "version=${GITHUB_REF_NAME#server-v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./apps/server/package.json').version")" >> $GITHUB_OUTPUT
          fi
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Check if KraftCloud service exists
        id: service-check
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          if kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service get engranatge-server >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Service engranatge-server already exists — will perform rolling update"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Service engranatge-server does not exist — will create it"
          fi

      - name: Deploy to KraftCloud
        uses: nick-fields/retry@v3
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 10
          # Rollout strategy:
          #   --rollout remove_sequential: new instance starts first, old
          #     one is removed only after --rollout-wait, so the API keeps
          #     serving traffic during the swap (zero downtime).
          #   --rollout-wait 30s: Nitro + Node + DB pool needs ~10-20s to
          #     warm up on a cold unikernel; 30s is the safety margin.
          #   -M 1024: 512 MiB caused CPIO extraction to run out of space
          #     on the marketing unikernel; matching 1024 here for the
          #     server's larger runtime footprint (DB driver, R2 SDK,
          #     AgentMail client).
          #   --service is mutually exclusive with -p/-d; those are set
          #   once during the first-time create branch below.
          command: |
            if [ "${{ steps.service-check.outputs.exists }}" = "true" ]; then
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --service engranatge-server \
                --rollout remove_sequential \
                --rollout-wait 30s \
                -M 1024 \
                -e NODE_ENV=production \
                -e PORT=3000 \
                -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                -e BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" \
                -e BETTER_AUTH_BASE_URL="${{ vars.BETTER_AUTH_BASE_URL }}" \
                -e ALLOWED_ORIGINS="${{ vars.ALLOWED_ORIGINS }}" \
                -e STORAGE_ENDPOINT="${{ vars.STORAGE_ENDPOINT }}" \
                -e STORAGE_REGION="${{ vars.STORAGE_REGION }}" \
                -e STORAGE_ACCESS_KEY_ID="${{ secrets.STORAGE_ACCESS_KEY_ID }}" \
                -e STORAGE_SECRET_ACCESS_KEY="${{ secrets.STORAGE_SECRET_ACCESS_KEY }}" \
                -e STORAGE_BUCKET="${{ vars.STORAGE_BUCKET }}" \
                -e EMAIL_API_KEY="${{ secrets.EMAIL_API_KEY }}" \
                -e EMAIL_WEBHOOK_SECRET="${{ secrets.EMAIL_WEBHOOK_SECRET }}" \
                -e EMAIL_PROVIDER="${{ vars.EMAIL_PROVIDER }}" \
                -e RESEARCH_SEARCH_PROVIDER="${{ vars.RESEARCH_SEARCH_PROVIDER }}" \
                -e RESEARCH_SCRAPE_PROVIDER="${{ vars.RESEARCH_SCRAPE_PROVIDER }}" \
                -e RESEARCH_EXTRACT_PROVIDER="${{ vars.RESEARCH_EXTRACT_PROVIDER }}" \
                -e RESEARCH_DISCOVER_PROVIDER="${{ vars.RESEARCH_DISCOVER_PROVIDER }}" \
                -e RESEARCH_REGISTRY_PROVIDER_ES="${{ vars.RESEARCH_REGISTRY_PROVIDER_ES }}" \
                -e RESEARCH_REPORT_PROVIDER_ES="${{ vars.RESEARCH_REPORT_PROVIDER_ES }}" \
                -e BRAVE_SEARCH_API_KEY="${{ secrets.BRAVE_SEARCH_API_KEY }}" \
                -e FIRECRAWL_API_KEY="${{ secrets.FIRECRAWL_API_KEY }}" \
                -e RESEARCH_LLM_PROVIDER="${{ vars.RESEARCH_LLM_PROVIDER }}" \
                -e RESEARCH_LLM_MODEL="${{ vars.RESEARCH_LLM_MODEL }}" \
                -e RESEARCH_LLM_API_KEY="${{ secrets.RESEARCH_LLM_API_KEY }}" \
                .
            else
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --name engranatge-server \
                -d api.engranatge.com \
                -p 443:3000 \
                -M 1024 \
                -e NODE_ENV=production \
                -e PORT=3000 \
                -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                -e BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" \
                -e BETTER_AUTH_BASE_URL="${{ vars.BETTER_AUTH_BASE_URL }}" \
                -e ALLOWED_ORIGINS="${{ vars.ALLOWED_ORIGINS }}" \
                -e STORAGE_ENDPOINT="${{ vars.STORAGE_ENDPOINT }}" \
                -e STORAGE_REGION="${{ vars.STORAGE_REGION }}" \
                -e STORAGE_ACCESS_KEY_ID="${{ secrets.STORAGE_ACCESS_KEY_ID }}" \
                -e STORAGE_SECRET_ACCESS_KEY="${{ secrets.STORAGE_SECRET_ACCESS_KEY }}" \
                -e STORAGE_BUCKET="${{ vars.STORAGE_BUCKET }}" \
                -e EMAIL_API_KEY="${{ secrets.EMAIL_API_KEY }}" \
                -e EMAIL_WEBHOOK_SECRET="${{ secrets.EMAIL_WEBHOOK_SECRET }}" \
                -e EMAIL_PROVIDER="${{ vars.EMAIL_PROVIDER }}" \
                -e RESEARCH_SEARCH_PROVIDER="${{ vars.RESEARCH_SEARCH_PROVIDER }}" \
                -e RESEARCH_SCRAPE_PROVIDER="${{ vars.RESEARCH_SCRAPE_PROVIDER }}" \
                -e RESEARCH_EXTRACT_PROVIDER="${{ vars.RESEARCH_EXTRACT_PROVIDER }}" \
                -e RESEARCH_DISCOVER_PROVIDER="${{ vars.RESEARCH_DISCOVER_PROVIDER }}" \
                -e RESEARCH_REGISTRY_PROVIDER_ES="${{ vars.RESEARCH_REGISTRY_PROVIDER_ES }}" \
                -e RESEARCH_REPORT_PROVIDER_ES="${{ vars.RESEARCH_REPORT_PROVIDER_ES }}" \
                -e BRAVE_SEARCH_API_KEY="${{ secrets.BRAVE_SEARCH_API_KEY }}" \
                -e FIRECRAWL_API_KEY="${{ secrets.FIRECRAWL_API_KEY }}" \
                -e RESEARCH_LLM_PROVIDER="${{ vars.RESEARCH_LLM_PROVIDER }}" \
                -e RESEARCH_LLM_MODEL="${{ vars.RESEARCH_LLM_MODEL }}" \
                -e RESEARCH_LLM_API_KEY="${{ secrets.RESEARCH_LLM_API_KEY }}" \
                .
            fi

      - name: Verify deployment
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          sleep 5
          kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} instance list | grep engranatge-server || true
          curl --retry 5 --retry-delay 5 --retry-all-errors -sf https://api.engranatge.com/health && echo "Health check passed" || echo "::warning::Health check failed"

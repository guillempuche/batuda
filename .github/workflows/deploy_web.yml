name: Deploy Web

on:
  push:
    tags:
      - "internal-v*"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

env:
  KRAFTCLOUD_METRO: fra

jobs:
  deploy:
    name: Deploy to KraftCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare files for KraftCloud
        run: |
          cp apps/internal/Kraftfile Kraftfile
          cp apps/internal/Dockerfile Dockerfile

      - name: Get KraftCloud CLI version
        id: kraft-version
        run: |
          KRAFT_VERSION=$(curl -sS https://api.github.com/repos/unikraft/kraftkit/releases/latest | jq -r '.tag_name')
          echo "version=${KRAFT_VERSION}" >> $GITHUB_OUTPUT

      - name: Cache KraftCloud CLI
        id: kraft-cache
        uses: actions/cache@v5
        with:
          path: kraft.deb
          key: kraft-cli-${{ steps.kraft-version.outputs.version }}

      - name: Download KraftCloud CLI
        if: steps.kraft-cache.outputs.cache-hit != 'true'
        run: |
          KRAFT_VERSION=${{ steps.kraft-version.outputs.version }}
          curl -sSfL "https://github.com/unikraft/kraftkit/releases/download/${KRAFT_VERSION}/kraftkit_${KRAFT_VERSION#v}_linux_amd64.deb" -o kraft.deb

      - name: Install KraftCloud CLI
        run: |
          sudo dpkg -i kraft.deb
          which kraft

      - name: Extract version from tag
        id: meta
        run: |
          if [[ "$GITHUB_REF_NAME" == internal-v* ]]; then
            echo "version=${GITHUB_REF_NAME#internal-v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./apps/internal/package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Check if KraftCloud service exists
        id: service-check
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          if kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service get batuda-web >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Service batuda-web already exists — will perform rolling update"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Service batuda-web does not exist — will create it"
          fi

      - name: Deploy to KraftCloud
        uses: nick-fields/retry@v4
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 10
          # Rolling update: --rollout remove_sequential brings up the new
          # instance, waits 30s for it to bind :3000, then removes the old
          # one. --name is omitted so both can coexist during the swap.
          # -M 1024 because 512 was not enough for the CPIO rootfs + Node
          # runtime. Scale-to-zero stays on via Kraftfile labels (internal
          # tool, low traffic, 30s cooldown is fine).
          command: |
            if [ "${{ steps.service-check.outputs.exists }}" = "true" ]; then
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --service batuda-web \
                --rollout remove_sequential \
                --rollout-wait 30s \
                -M 1024 \
                .
            else
              # First-time: create an explicitly-named service, then attach
              # the instance to it. Using `deploy --name` alone lets UKC
              # auto-name the service (e.g., "dawn-frog-jxfak9qt"), which
              # breaks the next deploy's `service get batuda-web` lookup
              # and forces a delete+recreate. Creating the service first
              # makes the name the stable identifier for rolling updates.
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service create \
                --name batuda-web \
                -d batuda.co \
                443:3000/tls+http \
                80:443/http+redirect
              kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} deploy \
                --timeout 5m \
                --service batuda-web \
                -M 1024 \
                .
            fi

      - name: Verify deployment
        env:
          KRAFTCLOUD_TOKEN: ${{ secrets.KRAFTCLOUD_TOKEN }}
        run: |
          sleep 5
          kraft cloud --metro ${{ env.KRAFTCLOUD_METRO }} service get batuda-web || true
          curl -sSf https://batuda.co -o /dev/null && echo "Site is accessible" || echo "::warning::Site not accessible"

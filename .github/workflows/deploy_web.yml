name: Deploy Web

on:
  push:
    tags:
      - "internal-v*"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

# Least privilege: deploy authenticates to Cloudflare via secrets, not the
# GitHub token. It only needs to read the repo.
permissions:
  contents: read

env:
  # Baked into the Vite client + SSR bundles via `import.meta.env.VITE_SERVER_URL`
  # and into the worker's API proxy targets. Build-time only.
  VITE_SERVER_URL: https://api.batuda.co
  INTERNAL_API_URL: https://api.batuda.co

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo builds @batuda/ui, @batuda/email, @batuda/controllers (and the
      # rest of the workspace dep graph via `dependsOn: ^build`) before the
      # app itself, so `vite build` finds their `dist/` outputs. The
      # @cloudflare/vite-plugin emits the Worker bundle + static assets under
      # apps/internal/dist/ and an auto-generated dist/server/wrangler.json.
      - name: Build
        run: pnpm turbo run build --filter=@batuda/internal

      # `wrangler deploy` reads apps/internal/wrangler.jsonc, uploads the
      # Worker (src/worker.ts → SSR + /auth,/v1,/docs proxy to api.batuda.co)
      # and the static client assets. The Workers Route for batuda.co is
      # managed out-of-band (CF dashboard / API), so a deploy never touches
      # the production domain binding.
      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/internal
          command: deploy

      # Gate the deploy on the site actually serving. Retry to absorb edge
      # propagation latency; fail the job if it never comes up so a broken
      # release doesn't pass silently.
      - name: Verify deployment
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -sSf https://batuda.co -o /dev/null; then
              echo "Site is accessible (attempt $attempt)"
              exit 0
            fi
            echo "Not up yet (attempt $attempt); retrying in 5s…"
            sleep 5
          done
          echo "::error::Site not accessible after deploy"
          exit 1
